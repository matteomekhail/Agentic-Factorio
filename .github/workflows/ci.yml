name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run test:mcp
      - name: Verify generated blueprints are committed
        run: npm run blueprints:build && git diff --exit-code
      - name: Verify mod package
        run: npm run package:mod
